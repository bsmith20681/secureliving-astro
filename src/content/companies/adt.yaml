name: "ADT"
slug: "adt"
phone: "(866) 968-7164"
phoneUnformatted: "18669687164"
website: "https://www.getsafestreets.com/secureliving"
rating:
  overall: 4.5
  equipment: 5
  features: 5
  pricing: 3.5
  easeOfUse: 4.5
  customerService: 4
logo: "../../assets/logos/adt-logo.png"
promo: "Nest Doorbell Camera + Full Security at No Cost"

# ── Overview ──────────────────────────────────────────────
installType: "professional" # options: professional | diy | both
contractRequired: true
monthToMonth: false
bestFor: "Those who want top-of-line security, lot of cameras, professional installation"
notesAboutContract: >
  "ADT has a minimum of a 12 month agreement if you purchase the equipment upfront. You can choose to finance the equipment up to 
  36 months. If you finance the equipment then you are required to keep the service as long as you have balance on the equipment."

# ── Pros & Cons ───────────────────────────────────────────
pros:
  - "Top-of-line equipment"
  - "Largest and longest running security company"
  - "Cameras still work if you cancel service"
  - "Excellent mobile app"
  - "Touchscreen keypad"

cons:
  - "Higher monthly cost"
  - "Minimum 12 month agreement"
  - "Equipment can be expensive upfront"

# ── Pricing ───────────────────────────────────────────────
pricing:
  monthly:
    min: 42.99
    max: 48.99
    notes: "$42.99 per month for monitoring and access to the app. Then goes up to $48.99 when you add cameras."
  equipment:
    min: 369
    max: null
    notes: "Financing available; cost rolled into monthly bill"
  contractLength: "12 months"
  activationFee: null
  cancelFee: null

# ── Monitoring ────────────────────────────────────────────
monitoring:
  247: true
  dispatchTypes:
    - police
    - fire
    - medical
  connection:
    wifi: true
    cellular: true # cellular backup
    landline: false
  backupBattery: true
  monitoringStations: null
  twoWayTalk: true

# ── Equipment ─────────────────────────────────────────────
equipment:
  panel:
    touchscreen: true
    type: "Command Panel"
  sensors:
    doorWindow: true
    motion: true
    glassBreak: true
  keyfob: true
  siren: true

# ── Cameras ───────────────────────────────────────────────
cameras:
  doorbell: true
  outdoor: true
  indoor: true
  powerOptions:
    - wired
    - battery
  features:
    hd: true
    nightVision: true
    twoWayTalk: true
    liveView: true
    continuousRecording: false
    aiSearch: false
  videoStorage:
    days: 30
    local: false
    cloud: true
  recordsWithoutWifi: false
  proprietaryToService: true # cameras stop working if you cancel

# ── Home Automation ───────────────────────────────────────
homeAutomation:
  zWaveSupport: true
  compatibleDevices:
    - doorLock
    - thermostat
    - garageDoor
    - lights
  nestCompatible: true
  automations: true # trigger-based rules (e.g. arm = lock door)
  scenes: true # one-tap preset configurations
  thirdPartyApp: false # no need for IFTTT etc.
  rating: "best" # best | good | limited | none

# ── Mobile App ────────────────────────────────────────────
mobileApp:
  rating: "good" # excellent | good | fair | poor
  singleApp: true
  remoteArmDisarm: true
  multiProperty: false
  remoteUserManagement: true
  cameraIntegrated: true

# ── Thoughts ────────────────────────────────────────────────
review: >
  ADT is a rock solid option with a long proven track record in home security. 
  It's a more affordable option to Vivint without sacrifcing on quality. They offer robust security monitoring,
  smart home features to automate the whole house, and high quality cameras to catch everything going on around the home.
