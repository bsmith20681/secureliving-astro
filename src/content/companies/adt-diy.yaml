name: "ADT DIY System"
slug: "adt-diy"
phone: "(833) 224-7221"
phoneUnformatted: "18332247221"
website: "https://s24alarms.com/YHSE"
rating:
  overall: 4.5
  equipment: 5
  features: 5
  pricing: 3.5
  easeOfUse: 5
  customerService: 4
logo: "../../assets/logos/adt-logo.png"
promo: "Nest Doorbell + Nest Camera — FREE"

# ── Overview ──────────────────────────────────────────────
installType: "diy" # options: professional | diy | both
contractRequired: false
monthToMonth: true
bestFor: "Those who want strong home automation and ADT's monitoring legacy at a slightly higher monthly price"
notesAboutContract: >
  Since the system is DIY and you pay for everything upfront, there is no contract.
  Service is month to month — cancel whenever you want with no penalty.

# ── Pros & Cons ───────────────────────────────────────────
pros:
  - "Super easy DIY installation — only about 2 hours"
  - "Backed by ADT with 6 monitoring stations — the largest and longest-running provider"
  - "Robust home automation with Z-Wave support (locks, thermostats, lights, garage doors)"
  - "Nest cameras still work via the Nest app even if you cancel ADT"
  - "Excellent mobile app — snappy, well-designed, everything in a single app"
  - "Can add more cameras without increasing the monthly bill"

cons:
  - "Push-button keypad instead of touchscreen — must tap to light up before entering code"
  - "No on-site tech support since it's DIY — phone support only"
  - "Cameras don't record without Wi-Fi (only up to 1 hour)"
  - "No power over Ethernet option for cameras"
  - "Can't download video clips from the ADT Plus app — must use Google Home app"
  - "Monthly cost is a few dollars more than competitors like Cove or SimpliSafe"

# ── Pricing ───────────────────────────────────────────────
pricing:
  monthly:
    min: 24.99
    max: 39.99
    notes: "$24.99 for basic security without cameras. $39.99 with cameras — includes Nest Aware subscription and ADT monitoring. 24/7 continuous recording is an extra $10/month."
  equipment:
    min: 350
    max: null
    notes: "Paid $350 for base station, sensors, motion sensor, glass break sensor, plus 2 free Nest cameras. Cost varies based on equipment needs."
  contractLength: "None"
  activationFee: null
  cancelFee: null

# ── Monitoring ────────────────────────────────────────────
monitoring:
  247: true
  dispatchTypes:
    - police
    - fire
    - medical
  connection:
    wifi: true
    cellular: true # cellular backup
    landline: false
  backupBattery: true
  monitoringStations: 6
  twoWayTalk: false # no two-way talk through the panel mentioned

# ── Equipment ─────────────────────────────────────────────
equipment:
  panel:
    touchscreen: false # push-button keypad built into base station
    type: "Base Station with Built-in Keypad"
  sensors:
    doorWindow: true
    motion: true
    glassBreak: true
  keyfob: false
  siren: true

# ── Cameras ───────────────────────────────────────────────
cameras:
  doorbell: true
  outdoor: true
  indoor: false
  powerOptions:
    - wired
    - battery
  features:
    hd: true
    nightVision: true
    twoWayTalk: true
    liveView: true
    continuousRecording: true # available for extra $10/month
    aiSearch: false
  videoStorage:
    days: 30
    local: false
    cloud: true
  recordsWithoutWifi: false # records up to 1 hour then stops
  proprietaryToService: false # cameras still work via Nest app if you cancel ADT

# ── Home Automation ───────────────────────────────────────
homeAutomation:
  zWaveSupport: true
  compatibleDevices:
    - doorLock
    - thermostat
    - garageDoor
    - lights
  nestCompatible: true
  automations: true # trigger-based rules with scheduling (e.g. arm = lock door, M-F 8am-9pm)
  scenes: true
  thirdPartyApp: false # no need for IFTTT etc.
  rating: "good" # best | good | limited | none — almost on par with Vivint

# ── Mobile App ────────────────────────────────────────────
mobileApp:
  rating: "excellent" # excellent | good | fair | poor
  singleApp: true # ADT Plus app contains everything (except video download — need Google Home for that)
  remoteArmDisarm: true
  multiProperty: false
  remoteUserManagement: true
  cameraIntegrated: true

# ── Thoughts ────────────────────────────────────────────────
review: >
  The ADT DIY system delivers a really solid home security experience
  with high-quality equipment that's easy to install in about 2 hours.
  The Nest cameras are a major plus — they're high definition with night
  vision and two-way talk, and they continue working via the Nest app even
  if you cancel ADT. Home automation is robust with Z-Wave support for locks,
  thermostats, lights, and garage doors, nearly matching Vivint. The ADT Plus
  app is snappy and well-designed. Being backed by ADT's 6 monitoring stations
  — the largest and longest-running provider — adds real value. The main
  drawbacks are the push-button keypad (no touchscreen), cameras not recording
  without Wi-Fi, and the monthly cost being a few dollars more than Cove or
  SimpliSafe. But when you factor in the free cameras deal, the upfront cost
  is practically a no-brainer.
