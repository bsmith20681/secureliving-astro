name: "ADT DIY"
slug: "adt-diy"
phone: "(833) 224-7221"
phoneUnformatted: "18332247221"
website: "https://s24alarms.com/YHSE"
rating:
  overall: 4
  equipment: 4
  features: 4.5
  pricing: 3.5
  easeOfUse: 4.5
  customerService: 4
logo: "../../assets/logos/adt-logo.png"
promo: "Nest Doorbell + Nest Camera — FREE"

# ── Overview ──────────────────────────────────────────────
installType: "diy" # options: professional | diy | both
contractRequired: false
monthToMonth: true
bestFor: "Those who want affordable pricing, but still want robust home automation"
notesAboutContract: >
  No contract. You simply pay up front for the equipment and can cancel the service whenever you want with no penalty. 

# ── Pros & Cons ───────────────────────────────────────────
pros:
  - "Easy DIY Installation. Takes less than 2 hours."
  - "Backed by ADT's 6 Monitoring stations."
  - "Most robust home automation for DIY system"
  - "Cameras still work even if you cancel the service"
  - "Easy to use app"
  - "Can add more cameras without increasing the monthly bill"

cons:
  - "Very basic panel"
  - "Phone support only. Will not send a tech"
  - "Cameras only record for one hour without wifi"
  - "No power over Ethernet option for cameras"
  - "You have to use two apps to download videos"
  - "More expensive than other DIY systems"

# ── Pricing ───────────────────────────────────────────────
pricing:
  monthly:
    min: 24.99
    max: 39.99
    notes: "$24.99 for basic security without cameras. $39.99 with cameras, this includes Nest Aware subscription and ADT monitoring. 24/7 continuous recording is an extra $10/month."
  equipment:
    min: 169
    max: null
    notes: "I Paid $350 for base station, sensors, motion sensor, glass break sensor, plus 2 free Nest cameras. Cost varies based on equipment needs."
  contractLength: "None"
  activationFee: null
  cancelFee: null

# ── Monitoring ────────────────────────────────────────────
monitoring:
  247: true
  dispatchTypes:
    - police
    - fire
    - medical
  connection:
    wifi: true
    cellular: true # cellular backup
    landline: false
  backupBattery: true
  monitoringStations: 6
  twoWayTalk: true # no two-way talk through the panel mentioned

# ── Equipment ─────────────────────────────────────────────
equipment:
  panel:
    touchscreen: false # push-button keypad built into base station
    type: "Base Station with Built-in Keypad"
  sensors:
    doorWindow: true
    motion: true
    glassBreak: true
  keyfob: true
  siren: true

# ── Cameras ───────────────────────────────────────────────
cameras:
  doorbell: true
  outdoor: true
  indoor: true
  powerOptions:
    - wired
    - battery
  features:
    hd: true
    nightVision: true
    twoWayTalk: true
    liveView: true
    continuousRecording: true # available for extra $10/month
    aiSearch: false
  videoStorage:
    days: 30
    local: false
    cloud: true
  recordsWithoutWifi: false # records up to 1 hour then stops
  proprietaryToService: false # cameras still work via Nest app if you cancel ADT

# ── Home Automation ───────────────────────────────────────
homeAutomation:
  zWaveSupport: true
  compatibleDevices:
    - doorLock
    - thermostat
    - garageDoor
    - lights
    - any other z-wave compatible device
  nestCompatible: true
  automations: true # trigger-based rules with scheduling (e.g. arm = lock door, M-F 8am-9pm)
  scenes: true
  thirdPartyApp: false # no need for IFTTT etc.
  rating: "good" # best | good | limited | none — almost on par with Vivint

# ── Mobile App ────────────────────────────────────────────
mobileApp:
  rating: "excellent" # excellent | good | fair | poor
  singleApp: true # ADT Plus app contains everything (except video download — need Google Home for that)
  remoteArmDisarm: true
  multiProperty: false
  remoteUserManagement: true
  cameraIntegrated: true

# ── Thoughts ────────────────────────────────────────────────
review: >
  The ADT DIY system delivers a really solid home security experience
  with high-quality equipment that's easy to install in about 2 hours.
  The Nest cameras are a major plus since they are high quality and you can still use them even if you cancel the service.
  ADT's DIY system has the most robust home automation out of all the DIY systems on the market. The ADT Plus
  app is snappy and well-designed. The main
  drawbacks are the push-button keypad (no touchscreen), cameras not recording
  without Wi-Fi, and the monthly cost being a few dollars more than Cove or
  SimpliSafe. It's cheaper than a professionally installed system, but it's one of the more expensive systems for DIY.
