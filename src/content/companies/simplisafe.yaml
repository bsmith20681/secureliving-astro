name: "SimpliSafe"
slug: "simplisafe"
phone: ""
website: "https://simplisafe.com/"
rating:
  overall: 3.5
  equipment: 3
  features: 3
  pricing: 3.5
  easeOfUse: 4
  customerService: 4
logo: "../../assets/logos/simplisafe-logo.png"
promo: "50% OFF Equipment + Free Camera"

# ── Overview ──────────────────────────────────────────────
installType: "diy" # options: professional | diy | both
contractRequired: false
monthToMonth: true
bestFor: "Those who want security camera montioring"
notesAboutContract: >
  "The service is month to month. "

# ── Pros & Cons ───────────────────────────────────────────
pros:
  - "Professional installation included"
  - "Best-in-class smart home automation"
  - "24/7 professional monitoring"
  - "Excellent mobile app"
  - "Touchscreen keypad"

cons:
  - "Higher monthly cost"
  - "Financing locks you into a service agreement"
  - "Equipment can be expensive upfront"
  - "Cameras are proprietary and stop working if you cancel"

# ── Pricing ───────────────────────────────────────────────
pricing:
  monthly:
    min: 29.99
    max: 49.99
    notes: "$29.99 covers basic monitoring to police, fire, and medical. It also covers the app"
  equipment:
    min: 599
    max: null
    notes: "Financing available; cost rolled into monthly bill"
  contractLength: "60 months"
  activationFee: null
  cancelFee: null

# ── Monitoring ────────────────────────────────────────────
monitoring:
  247: true
  dispatchTypes:
    - police
    - fire
    - medical
  connection:
    wifi: true
    cellular: true # cellular backup
    landline: false
  backupBattery: true
  monitoringStations: null
  twoWayTalk: true

# ── Equipment ─────────────────────────────────────────────
equipment:
  panel:
    touchscreen: true
    type: "Smart Hub"
  sensors:
    doorWindow: true
    motion: true
    glassBreak: true
  keyfob: false
  siren: true

# ── Cameras ───────────────────────────────────────────────
cameras:
  doorbell: true
  outdoor: true
  indoor: true
  powerOptions:
    - wired
    - battery
  features:
    hd: true
    nightVision: true
    twoWayTalk: true
    liveView: true
    continuousRecording: false
    aiSearch: false
  videoStorage:
    days: 30
    local: false
    cloud: true
  recordsWithoutWifi: false
  proprietaryToService: true # cameras stop working if you cancel

# ── Home Automation ───────────────────────────────────────
homeAutomation:
  zWaveSupport: true
  compatibleDevices:
    - doorLock
  nestCompatible: true
  automations: true # trigger-based rules (e.g. arm = lock door)
  scenes: true # one-tap preset configurations
  thirdPartyApp: false # no need for IFTTT etc.
  rating: "best" # best | good | limited | none

# ── Mobile App ────────────────────────────────────────────
mobileApp:
  rating: "excellent" # excellent | good | fair | poor
  singleApp: true
  remoteArmDisarm: true
  multiProperty: false
  remoteUserManagement: true
  cameraIntegrated: true

# ── Thoughts ────────────────────────────────────────────────
review: >
  Vivint is one of the top professional home security providers,
  offering a fully integrated smart home security system with
  professional installation and monitoring. Their equipment is
  high quality, the touchscreen panel is intuitive, and the mobile
  app is among the best in the industry. Home automation is more
  robust than nearly every competitor, rivaled only by ADT's pro
  install system. The main drawbacks are the long 60-month contract
  and higher price point — and like SimpliSafe, cameras are
  proprietary and stop working if you cancel service.
