name: "SimpliSafe"
slug: "simplisafe"
phone: ""
website: "https://simplisafe.com/"
rating:
  overall: 3.5
  equipment: 3
  features: 3
  pricing: 3.5
  easeOfUse: 4
  customerService: 4
logo: "../../assets/logos/simplisafe-logo.png"
promo: "20% OFF Equipment + Free Indoor Camera"

# ── Overview ──────────────────────────────────────────────
installType: "diy" # options: professional | diy | both
contractRequired: false
monthToMonth: true
bestFor: "Those who want live video security monitoring."
notesAboutContract: >
  "The service is month to month. No penalty to cancel the service."

# ── Pros & Cons ───────────────────────────────────────────
pros:
  - "Live Video Monitoring"
  - "Best-in-class smart home automation"
  - "Easy to Install"

cons:
  - "High Monthly Costs"
  - "Cameras are proprietary"
  - "Standard Equipment"
  - "No 24/7 Continous Recording"

# ── Pricing ───────────────────────────────────────────────
pricing:
  monthly:
    min: 29.99
    max: 79.99
    notes: "$29.99 covers basic monitoring to police, fire, medical, and access to the app on the phone. $49 per month covers monitoring and live video security monioring between 8PM-6AM. $79 per month covers monitoring and 24/7 live video security monitoring."
  equipment:
    min: 280
    max: null
    notes: ""
  contractLength: "None"
  activationFee: null
  cancelFee: null

# ── Monitoring ────────────────────────────────────────────
monitoring:
  247: true
  dispatchTypes:
    - police
    - fire
    - medical
  connection:
    wifi: true
    cellular: true # cellular backup
    landline: false
  backupBattery: true
  monitoringStations: null
  twoWayTalk: true

# ── Equipment ─────────────────────────────────────────────
equipment:
  panel:
    touchscreen: true
    type: "Basic Keypad"
  sensors:
    doorWindow: true
    motion: true
    glassBreak: true
  keyfob: true
  siren: true

# ── Cameras ───────────────────────────────────────────────
cameras:
  doorbell: true
  outdoor: true
  indoor: true
  powerOptions:
    - wired
    - battery
  features:
    hd: true
    nightVision: true
    twoWayTalk: true
    liveView: true
    continuousRecording: false
    aiSearch: false
  videoStorage:
    days: 30
    local: false
    cloud: true
  recordsWithoutWifi: false
  proprietaryToService: true # cameras stop working if you cancel

# ── Home Automation ───────────────────────────────────────
homeAutomation:
  zWaveSupport: false
  compatibleDevices:
    - doorLock
  nestCompatible: false
  automations: true # only for the alarm and doorlock
  scenes: false # one-tap preset configurations
  thirdPartyApp: false
  rating: "limited" # best | good | limited | none

# ── Mobile App ────────────────────────────────────────────
mobileApp:
  rating: "fair" # excellent | good | fair | poor
  singleApp: true
  remoteArmDisarm: true
  multiProperty: false
  remoteUserManagement: true
  cameraIntegrated: true

# ── Thoughts ────────────────────────────────────────────────
review: >
  "test test"
