name: "SimpliSafe"
slug: "simplisafe"
phone: ""
website: "https://simplisafe.com/"
rating:
  overall: 3.5
  equipment: 3
  features: 3.5
  pricing: 3
  easeOfUse: 4
  customerService: 4
logo: "../../assets/logos/simplisafe-logo.png"
promo: "20% OFF Equipment + Free Indoor Camera"

# ── Overview ──────────────────────────────────────────────
installType: "diy" # options: professional | diy | both
contractRequired: false
monthToMonth: true
bestFor: "Those who want live video security monitoring."
notesAboutContract: >
  "The service is month to month. No penalty to cancel the service."

# ── Pros & Cons ───────────────────────────────────────────
pros:
  - "Active Guard live video monitoring is unique in the industry"
  - "Easy DIY installation with refined setup process"
  - "No contract, month-to-month service"
  - "Free monitoring plan available with basic app control"
  - "Cellular backup keeps monitoring active when Wi-Fi is down"

cons:
  - "No touchscreen keypad (basic push-button style)"
  - "Cameras are proprietary (stop working if you cancel)"
  - "Limited smart home and home automation features"
  - "No 24/7 continuous recording (clips only)"
  - "Monthly cost has increased significantly (no longer the budget option)"
  - "Can't use existing hardwired sensors"

# ── Pricing ───────────────────────────────────────────────
pricing:
  monthly:
    min: 32.99
    max: 79.99
    notes: "$32.99 covers basic monitoring to police, fire, medical, and access to the app on the phone. $49 per month covers monitoring and live video security monioring between 8PM-6AM. $79 per month covers monitoring and 24/7 live video security monitoring."
  equipment:
    min: 280
    max: null
    notes: "My system cost $965.89, but I was able to get 50% off so I only paid $519.10."
  contractLength: "None"
  activationFee: null
  cancelFee: null

# ── Monitoring ────────────────────────────────────────────
monitoring:
  247: true
  dispatchTypes:
    - police
    - fire
    - medical
  connection:
    wifi: true
    cellular: true # cellular backup
    landline: false
  backupBattery: true
  monitoringStations: null
  twoWayTalk: true

# ── Equipment ─────────────────────────────────────────────
equipment:
  panel:
    touchscreen: false
    type: "Basic Keypad"
  sensors:
    doorWindow: true
    motion: true
    glassBreak: true
  keyfob: true
  siren: true

# ── Cameras ───────────────────────────────────────────────
cameras:
  doorbell: true
  outdoor: true
  indoor: true
  powerOptions:
    - wired
    - battery
  features:
    hd: true
    nightVision: true
    twoWayTalk: true
    liveView: true
    continuousRecording: false
    aiSearch: false
  videoStorage:
    days: 30
    local: false
    cloud: true
  recordsWithoutWifi: false
  proprietaryToService: true # cameras stop working if you cancel

# ── Home Automation ───────────────────────────────────────
homeAutomation:
  zWaveSupport: false
  compatibleDevices:
    - doorLock
  nestCompatible: false
  automations: true # only for the alarm and doorlock
  scenes: false # one-tap preset configurations
  thirdPartyApp: false
  rating: "limited" # best | good | limited | none

# ── Mobile App ────────────────────────────────────────────
mobileApp:
  rating: "fair" # excellent | good | fair | poor
  singleApp: true
  remoteArmDisarm: true
  multiProperty: false
  remoteUserManagement: true
  cameraIntegrated: true

# ── Thoughts ────────────────────────────────────────────────
review: >
  "SimpliSafe is a solid DIY home security system with one standout feature: Active Guard live video monitoring. The equipment is easy to install, the monitoring is month-to-month with no contract, and the cellular backup keeps things running when Wi-Fi goes down. The biggest drawbacks are the basic push-button keypad, proprietary cameras, and limited smart home integration. If you want Active Guard, SimpliSafe is the pick. If you just want standard monitoring, Cove offers better value at the same price."
