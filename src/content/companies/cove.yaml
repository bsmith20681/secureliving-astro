name: "Cove"
slug: "cove"
phone: ""
website: "https://www.covetrack.com/2714DHQ/9ZBW6W/"
rating:
  overall: 4.5
  equipment: 5
  features: 5
  pricing: 3.5
  easeOfUse: 5
  customerService: 4
logo: "../../assets/logos/cove-logo.png"
promo: "70% OFF + Free Indoor Camera"

# ── Overview ──────────────────────────────────────────────
installType: "diy" # options: professional | diy | both
contractRequired: false
monthToMonth: true
bestFor: "Budget-conscious homeowners who want solid home security without smart home features"
notesAboutContract: >
  Since the system is DIY and you pay for everything upfront, there is no contract.
  Service is month to month — cancel whenever you want with no penalty.

# ── Pros & Cons ───────────────────────────────────────────
pros:
  - "Most affordable home security system — best value/bang for the buck"
  - "Touchscreen keypad panel with easy navigation"
  - "Super easy DIY installation — sensors took only 30 minutes"
  - "Two-way voice built into the panel for emergency communication"
  - "Cameras record locally via SD card even without Wi-Fi"
  - "Cameras are not proprietary — can resync to eufy app if you cancel Cove"
  - "Add unlimited cameras without increasing monthly bill"
  - "Renter-friendly — wireless sensors remove cleanly with no residue"

cons:
  - "No home automation (no smart locks, thermostats, lights, etc.)"
  - "Camera initial setup is frustrating — must be 100% charged and on 2.4 GHz Wi-Fi"
  - "No 24/7 continuous recording — only records clips"
  - "No power over Ethernet option for cameras"
  - "Mobile app not quite as polished as Vivint or ADT"
  - "Glass break sensor may peel off a small amount of drywall when removed"

# ── Pricing ───────────────────────────────────────────────
pricing:
  monthly:
    min: 23
    max: 33
    notes: "$23/mo for security only (no cameras). $33/mo with cameras — includes monitoring, warranty, app, and cameras. $5 of the $33 goes toward an equipment credit on your account."
  equipment:
    min: 250
    max: null
    notes: "Paid $250.48 with 70% off + free indoor camera for full system including 3 cameras, panel, sensors, motion sensor, and glass break sensor."
  contractLength: "None"
  activationFee: null
  cancelFee: null

# ── Monitoring ────────────────────────────────────────────
monitoring:
  247: true
  dispatchTypes:
    - police
    - fire
    - medical
  connection:
    wifi: true
    cellular: true # cellular backup
    landline: false
  backupBattery: true
  monitoringStations: null
  twoWayTalk: true # built into the panel

# ── Equipment ─────────────────────────────────────────────
equipment:
  panel:
    touchscreen: true
    type: "Touchscreen Keypad"
  sensors:
    doorWindow: true
    motion: true
    glassBreak: true
  keyfob: false
  siren: true

# ── Cameras ───────────────────────────────────────────────
cameras:
  doorbell: true
  outdoor: true
  indoor: true # pan and tilt capability
  powerOptions:
    - wired # indoor camera is wired; doorbell can be wired
    - battery # doorbell and outdoor run on battery
    - solar # outdoor camera recharges via solar panel
  features:
    hd: true
    nightVision: true
    twoWayTalk: true
    liveView: true
    continuousRecording: false # only records clips, no 24/7 option
    aiSearch: false
  videoStorage:
    days: null
    local: true # SD card in each camera — records even without Wi-Fi
    cloud: true
  recordsWithoutWifi: true # SD card local recording continues without Wi-Fi
  proprietaryToService: false # eufy cameras — can resync to eufy app if you cancel Cove

# ── Home Automation ───────────────────────────────────────
homeAutomation:
  zWaveSupport: false
  compatibleDevices: []
  nestCompatible: false
  automations: true # security-only automations (e.g. arm/disarm on a schedule)
  scenes: false
  thirdPartyApp: false
  rating: "limited" # best | good | limited | none — security automations only, no smart home

# ── Mobile App ────────────────────────────────────────────
mobileApp:
  rating: "good" # excellent | good | fair | poor — works well but not as polished as Vivint/ADT
  singleApp: true # cameras and security all in one app
  remoteArmDisarm: true
  multiProperty: false
  remoteUserManagement: true
  cameraIntegrated: true

# ── Thoughts ────────────────────────────────────────────────
review: >
  Cove is the most affordable and best-value home security system on the
  market right now. For about $250 upfront (with the 70% off deal) and $33/month,
  you get a touchscreen panel, door/window sensors, motion and glass break
  sensors, and three cameras (indoor, doorbell, and outdoor). The equipment
  is rock solid for the price, installation is super simple (sensors took
  only 30 minutes), and the cameras record locally via SD card even without
  Wi-Fi. The biggest caveat is there's no smart home automation — no door
  locks, thermostats, or lights. If you just want straightforward home
  security monitoring to police, fire, and medical without breaking the bank,
  Cove is the way to go. The mobile app gets the job done but isn't quite
  as polished as Vivint or ADT. Camera setup can be frustrating initially
  (must be fully charged and on 2.4 GHz Wi-Fi), but once connected
  everything works great. It's also renter-friendly since everything is
  wireless and removes cleanly.
