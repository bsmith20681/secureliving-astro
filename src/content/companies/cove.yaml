name: "Cove"
slug: "cove"
phone: ""
website: "https://www.covetrack.com/2714DHQ/9ZBW6W/"
rating:
  overall: 4.5
  equipment: 4.5
  features: 4
  pricing: 4.5
  easeOfUse: 4.5
  customerService: 4
logo: "../../assets/logos/cove-logo.png"
promo: "70% OFF + Free Indoor Camera"

# ── Overview ──────────────────────────────────────────────
installType: "diy" # options: professional | diy | both
contractRequired: false
monthToMonth: true
bestFor: "Those who are not afraid to install a system on their own, want to save money, and don't care about home automation"
notesAboutContract: >
  Since the system is DIY and you pay for everything upfront, there is no contract.
  Service is month to month. You can cancel whenever you want with no penalty.

# ── Pros & Cons ───────────────────────────────────────────
pros:
  - "Best Value. High Quality Equipment for the Price"
  - "Touchscreen keypad panel"
  - "Super easy DIY installation"
  - "Two-way voice built into the panel for emergency communication"
  - "Cameras record locally via SD card even without Wi-Fi"
  - "Cameras can still be used if you cancel the service"
  - "Add unlimited cameras without increasing monthly bill"
  - "Renter-friendly, wireless sensors remove cleanly with no residue"

cons:
  - "No home automation"
  - "Connecting the cameras on install is frustrating"
  - "No 24/7 video recording recording"
  - "No power over Ethernet option for cameras"
  - "Mobile app not quite as polished"

# ── Pricing ───────────────────────────────────────────────
pricing:
  monthly:
    min: 23
    max: 33
    notes: "$23/mo for security only (no cameras). $33/mo with cameras — includes monitoring, warranty, app, and cameras. $5 of the $33 goes toward an equipment credit on your account."
  equipment:
    min: 130
    max: null
    notes: "I Paid $250.48 with 70% off + free indoor camera for full system including 3 cameras, panel, sensors, motion sensor, and glass break sensor."
  contractLength: "None"
  activationFee: null
  cancelFee: null

# ── Monitoring ────────────────────────────────────────────
monitoring:
  247: true
  dispatchTypes:
    - police
    - fire
    - medical
  connection:
    wifi: true
    cellular: true # cellular backup
    landline: false
  backupBattery: true
  monitoringStations: null
  twoWayTalk: true # built into the panel

# ── Equipment ─────────────────────────────────────────────
equipment:
  panel:
    touchscreen: true
    type: "Touchscreen Keypad"
  sensors:
    doorWindow: true
    motion: true
    glassBreak: true
  keyfob: false
  siren: true

# ── Cameras ───────────────────────────────────────────────
cameras:
  doorbell: true
  outdoor: true
  indoor: true # pan and tilt capability
  powerOptions:
    - wired # indoor camera is wired; doorbell can be wired
    - battery # doorbell and outdoor run on battery
    - solar # outdoor camera recharges via solar panel
  features:
    hd: true
    nightVision: true
    twoWayTalk: true
    liveView: true
    continuousRecording: false # only records clips, no 24/7 option
    aiSearch: false
  videoStorage:
    days: null
    local: true # SD card in each camera — records even without Wi-Fi
    cloud: true
  recordsWithoutWifi: true # SD card local recording continues without Wi-Fi
  proprietaryToService: false # eufy cameras — can resync to eufy app if you cancel Cove

# ── Home Automation ───────────────────────────────────────
homeAutomation:
  zWaveSupport: false
  compatibleDevices: []
  nestCompatible: false
  automations: true # security-only automations (e.g. arm/disarm on a schedule)
  scenes: false
  thirdPartyApp: false
  rating: "limited" # best | good | limited | none — security automations only, no smart home

# ── Mobile App ────────────────────────────────────────────
mobileApp:
  rating: "good" # excellent | good | fair | poor — works well but not as polished as Vivint/ADT
  singleApp: true # cameras and security all in one app
  remoteArmDisarm: true
  multiProperty: false
  remoteUserManagement: true
  cameraIntegrated: true

# ── Thoughts ────────────────────────────────────────────────
review: >
  Cove offers the best value on the market right now. This system is best for Those
  who want to protect their home without breaking the bank. It comes with all the security features
  you would expect out of a higher end security system. Touch screen keypad, HD cameras, video recording without wifi, mobile app etc.
  It's limitation though is there is no home automation for this system. If you are looking for an all in one system, then this wouldn't be a goood fit. 
  However, if you want rock solid security with a low monthly price and a low upfront cost then is is a great system to own.
