name: "Ring"
slug: "ring"
phone: ""
website: "https://ring.com/"
rating:
  overall: 4.5
  equipment: 5
  features: 5
  pricing: 3.5
  easeOfUse: 5
  customerService: 4
logo: "../../assets/logos/ring-logo.png"
promo: "Save $150 on Whole Home Enhanced Kit"

# ── Overview ──────────────────────────────────────────────
installType: "diy" # options: professional | diy | both
contractRequired: false
monthToMonth: true
bestFor: "Those already in the Ring ecosystem who want affordable monthly monitoring added to their cameras"
notesAboutContract: >
  Since the system is DIY and you pay for everything upfront, there is no contract.
  Service is month to month — cancel whenever you want with no penalty.

# ── Pros & Cons ───────────────────────────────────────────
pros:
  - "Lowest monthly monitoring cost — $20/month for AI Pro plan"
  - "Super easy DIY installation — only about 1.5 hours"
  - "Excellent camera quality with night vision and two-way talk"
  - "Video storage up to 180 days"
  - "Local recording option for privacy (stored on the panel)"
  - "AI-powered notifications with descriptions (e.g. 'Amazon driver delivering a package')"
  - "Great mobile app — smooth, responsive, easy to use"

cons:
  - "No touchscreen keypad — limited to app control only"
  - "No two-way talk through the panel — agents can't communicate to you during a break-in"
  - "Cameras don't record without Wi-Fi"
  - "Equipment is more expensive upfront than Cove (~$100 more for comparable system)"
  - "Home automation is limited — needs third-party apps like IFTTT for schedules and routines"
  - "Not compatible with Nest thermostat"

# ── Pricing ───────────────────────────────────────────────
pricing:
  monthly:
    min: 20
    max: 99
    notes: "$20/mo for AI Pro plan — covers 24/7 monitoring plus camera storage. $99/mo for Virtual Guard plan — agents actively monitor cameras and dispatch police for suspicious activity. Optional 24/7 continuous recording is $3/mo per camera."
  equipment:
    min: 376
    max: 500
    notes: "Whole Home Enhanced Package normally costs $500. Got it on sale for $376 — includes hub, panel, 4 door/window sensors, motion sensor, doorbell camera, and outdoor camera."
  contractLength: "None"
  activationFee: null
  cancelFee: null

# ── Monitoring ────────────────────────────────────────────
monitoring:
  247: true
  dispatchTypes:
    - police
    - fire
    - medical
  connection:
    wifi: true
    cellular: true # cellular backup
    landline: false
  backupBattery: true
  monitoringStations: null
  twoWayTalk: false # no two-way talk through the panel — a major con

# ── Equipment ─────────────────────────────────────────────
equipment:
  panel:
    touchscreen: false # no touchscreen — app-only or basic keypad
    type: "Keypad (no touchscreen)"
  sensors:
    doorWindow: true
    motion: true
    glassBreak: false # not included in the system reviewed
  keyfob: false
  siren: true

# ── Cameras ───────────────────────────────────────────────
cameras:
  doorbell: true
  outdoor: true
  indoor: false # not included in the Whole Home Enhanced Package
  powerOptions:
    - wired
    - battery
  features:
    hd: true
    nightVision: true
    twoWayTalk: true
    liveView: true
    continuousRecording: true # available for extra $3/month per camera
    aiSearch: true # AI search and AI descriptions for notifications
  videoStorage:
    days: 180
    local: true # can record locally on the panel for privacy
    cloud: true
  recordsWithoutWifi: false # cameras are completely dependent on Wi-Fi to record
  proprietaryToService: false

# ── Home Automation ───────────────────────────────────────
homeAutomation:
  zWaveSupport: true
  compatibleDevices:
    - doorLock
    - thermostat
  nestCompatible: false # not compatible with Nest thermostat
  automations: false # no built-in schedules or routines — need third-party apps
  scenes: false
  thirdPartyApp: true # requires IFTTT or similar for automation routines
  rating: "limited" # best | good | limited | none — Z-Wave support exists but limited functionality

# ── Mobile App ────────────────────────────────────────────
mobileApp:
  rating: "excellent" # excellent | good | fair | poor — really good, smooth UX, no issues
  singleApp: true
  remoteArmDisarm: true
  multiProperty: false
  remoteUserManagement: true
  cameraIntegrated: true

# ── Thoughts ────────────────────────────────────────────────
review: >
  Ring offers a really solid DIY home security system with one of the
  lowest monthly monitoring costs on the market at just $20/month. The
  cameras are impressive with HD quality, night vision, 180-day video
  storage, and AI-powered smart notifications. Installation is a breeze
  at only about 1.5 hours, and the mobile app is smooth and responsive.
  The main drawbacks are the lack of a touchscreen keypad (you're stuck
  using the app), no two-way talk through the panel for emergencies, and
  cameras that won't record without Wi-Fi. Home automation is limited
  compared to ADT or Vivint — you'll need third-party apps like IFTTT
  for scheduling and routines. Equipment is about $100 more than Cove for
  a comparable setup, but the monthly savings make up for it over time.
  If you're already in the Ring ecosystem with their cameras and doorbell,
  adding the alarm system is a great way to flesh out your home security
  without breaking the bank.
