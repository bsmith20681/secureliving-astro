name: "Ring"
slug: "ring"
phone: ""
website: "https://ring.com/"
rating:
  overall: 3.5
  equipment: 4
  features: 4
  pricing: 3.5
  easeOfUse: 4.5
  customerService: 3.5
logo: "../../assets/logos/ring-logo.png"
promo: "Save $150 on Whole Home Enhanced Kit"

# ── Overview ──────────────────────────────────────────────
installType: "diy" # options: professional | diy | both
contractRequired: false
monthToMonth: true
bestFor: "Those already in the Ring ecosystem and want to add basic security"
notesAboutContract: >
  The service is month-to-month. You can cancel whenever you want with no penalty.

# ── Pros & Cons ───────────────────────────────────────────
pros:
  - "Lowest Monthly Price"
  - "Easy DIY Installation"
  - "Excellent camera quality with night vision and two-way talk"
  - "Video storage up to 180 days"
  - "AI-powered notifications with descriptions"
  - "Great mobile app — smooth, responsive, easy to use"

cons:
  - "Camera Privacy Concerns Amongst Customers"
  - "No touchscreen keypad"
  - "No two-way talk through the panel"
  - "Cameras don't record without Wi-Fi"
  - "High equipment cost"
  - "Limited Home Automation Features"
  - "Not compatible with Nest thermostat"

# ── Pricing ───────────────────────────────────────────────
pricing:
  monthly:
    min: 20
    max: 99
    notes: "$20/mo for basic security monitoring. $99/mo for Virtual Guard plan, agents actively monitor cameras and dispatch police for suspicious activity. Optional 24/7 continuous recording is $3/mo per camera."
  equipment:
    min: 376
    max: 500
    notes: "Whole Home Enhanced Package normally costs $500. Got it on sale for $376 — includes hub, panel, 4 door/window sensors, motion sensor, doorbell camera, and outdoor camera."
  contractLength: "None"
  activationFee: null
  cancelFee: null

# ── Monitoring ────────────────────────────────────────────
monitoring:
  247: true
  dispatchTypes:
    - police
    - fire
    - medical
  connection:
    wifi: true
    cellular: true # cellular backup
    landline: false
  backupBattery: true
  monitoringStations: null
  twoWayTalk: false # no two-way talk through the panel — a major con

# ── Equipment ─────────────────────────────────────────────
equipment:
  panel:
    touchscreen: false # no touchscreen — app-only or basic keypad
    type: "Basic Keypad"
  sensors:
    doorWindow: true
    motion: true
    glassBreak: true
  keyfob: false
  siren: true

# ── Cameras ───────────────────────────────────────────────
cameras:
  doorbell: true
  outdoor: true
  indoor: true
  powerOptions:
    - wired
    - battery
  features:
    hd: true
    nightVision: true
    twoWayTalk: true
    liveView: true
    continuousRecording: true # available for extra $3/month per camera
    aiSearch: true # AI search and AI descriptions for notifications
  videoStorage:
    days: 180
    local: true # can record locally on the panel for privacy
    cloud: true
  recordsWithoutWifi: false # cameras are completely dependent on Wi-Fi to record
  proprietaryToService: false

# ── Home Automation ───────────────────────────────────────
homeAutomation:
  zWaveSupport: true
  compatibleDevices:
    - doorLock
    - thermostat
  nestCompatible: false # not compatible with Nest thermostat
  automations: false # no built-in schedules or routines — need third-party apps
  scenes: false
  thirdPartyApp: true # requires IFTTT or similar for automation routines
  rating: "limited" # best | good | limited | none — Z-Wave support exists but limited functionality

# ── Mobile App ────────────────────────────────────────────
mobileApp:
  rating: "excellent" # excellent | good | fair | poor — really good, smooth UX, no issues
  singleApp: true
  remoteArmDisarm: true
  multiProperty: false
  remoteUserManagement: true
  cameraIntegrated: true

# ── Thoughts ────────────────────────────────────────────────
review: >
  Ring offers the lowest priced security system at just $19.99 per month. As we have seen with other companies like Simplisafe, I wouldn't be surprised if that price rises
  over the next few years. The security features and equipment are very basic. So this setup would be best for those who already have the Ring cameras and want to add a little more security
  to their setup. The cameras are great and easy to install. I also enjoyed the descriptive ai notifications that come through the app. The upfront cost for Ring is more than other companies. 
