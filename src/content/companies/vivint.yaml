name: "Vivint"
slug: "vivint"
phone: "(833) 606-2573"
phoneUnformatted: "18336062573"
website: "http://t.vivint.com/?c=1829&lp=4"
rating:
  overall: 4.5
  equipment: 5
  features: 5
  pricing: 4
  easeOfUse: 5
  customerService: 4
logo: "../../assets/logos/vivint-logo.png"
promo: "$0 Activation with Professional Installation"

# ── Overview ──────────────────────────────────────────────
installType: "professional" # options: professional | diy | both
contractRequired: false
monthToMonth: true
bestFor: "Those the top-of-line smart home security setup."
notesAboutContract: >
  "Vivint's service is month to month if you pay for the equipment upfront. 
  This means that there is no contract and you can cancel at anytime without penalty.
  However, you can choose to finance the equipment at 0% APR for either 42 months or 60 months. 
  If you finance, you are obligated to have the service as long as there is a balance on the equipment."

# ── Pros & Cons ───────────────────────────────────────────
pros:
  - "Professional installation included"
  - "Best-in-class smart home automation"
  - "24/7 professional monitoring"
  - "Excellent mobile app"
  - "Touchscreen keypad"

cons:
  - "Higher monthly cost"
  - "Financing locks you into a service agreement"
  - "Equipment can be expensive upfront"
  - "Cameras are proprietary and stop working if you cancel"

# ── Pricing ───────────────────────────────────────────────
pricing:
  monthly:
    min: 29.99
    max: 49.99
    notes: "$29.99 covers basic monitoring to police, fire, and medical. It also covers the app"
  equipment:
    min: 599
    max: null
    notes: "Financing available; cost rolled into monthly bill"
  contractLength: "60 months"
  activationFee: null
  cancelFee: null

# ── Monitoring ────────────────────────────────────────────
monitoring:
  247: true
  dispatchTypes:
    - police
    - fire
    - medical
  connection:
    wifi: true
    cellular: true # cellular backup
    landline: false
  backupBattery: true
  monitoringStations: null
  twoWayTalk: true

# ── Equipment ─────────────────────────────────────────────
equipment:
  panel:
    touchscreen: true
    type: "Smart Hub"
  sensors:
    doorWindow: true
    motion: true
    glassBreak: true
  keyfob: false
  siren: true

# ── Cameras ───────────────────────────────────────────────
cameras:
  doorbell: true
  outdoor: true
  indoor: true
  powerOptions:
    - wired
    - battery
  features:
    hd: true
    nightVision: true
    twoWayTalk: true
    liveView: true
    continuousRecording: false
    aiSearch: false
  videoStorage:
    days: 30
    local: false
    cloud: true
  recordsWithoutWifi: false
  proprietaryToService: true # cameras stop working if you cancel

# ── Home Automation ───────────────────────────────────────
homeAutomation:
  zWaveSupport: true
  compatibleDevices:
    - doorLock
    - thermostat
    - garageDoor
    - lights
  nestCompatible: true
  automations: true # trigger-based rules (e.g. arm = lock door)
  scenes: true # one-tap preset configurations
  thirdPartyApp: false # no need for IFTTT etc.
  rating: "best" # best | good | limited | none

# ── Mobile App ────────────────────────────────────────────
mobileApp:
  rating: "excellent" # excellent | good | fair | poor
  singleApp: true
  remoteArmDisarm: true
  multiProperty: false
  remoteUserManagement: true
  cameraIntegrated: true

# ── Thoughts ────────────────────────────────────────────────
review: >
  Vivint is one of the top professional home security providers,
  offering a fully integrated smart home security system with
  professional installation and monitoring. Their equipment is
  high quality, the touchscreen panel is intuitive, and the mobile
  app is among the best in the industry. Home automation is more
  robust than nearly every competitor, rivaled only by ADT's pro
  install system. The main drawbacks are the high equipment cost and proprietary cameras.
